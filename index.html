<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 WEB GAME ĐẦU BÒ - TRẦN BẢO NAM 🎮</title>
    <style>
        /* Hiệu ứng nền Gradient chuyển động mượt mà */
        body { 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            margin: 40px 0; 
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.4);
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Chia 2 game trên 1 hàng (Grid) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 cột bằng nhau */
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        .game-card { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
        }

        h2 { color: #00ffcc; font-size: 1.2rem; margin-bottom: 10px; }

        /* Khung iframe sạch sẽ, không chặn quyền */
        iframe { 
            width: 100%; 
            height: 450px; 
            border: none; 
            border-radius: 12px; 
            background: #000;
        }

        /* Chế độ mobile: Chuyển về 1 game 1 hàng để dễ nhìn */
        @media (max-width: 850px) {
            .game-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
            iframe { height: 350px; }
        }

        .footer { 
            margin-top: auto; 
            background: rgba(0,0,0,0.7); 
            width: 100%; 
            text-align: center; 
            padding: 20px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <h1>🎮 TRẠM GAME ĐẦU BÒ CỦA NAM 🎮</h1>

    <div class="game-grid">
        <div class="game-card">
            <h2>Trò Chơi 1</h2>
            <iframe src="https://html5.gamedistribution.com/a084e6ab82f9420bbe89bbe5c1b150fc/" scrolling="none" frameborder="0"></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 2</h2>
            <iframe src="https://html5.gamedistribution.com/4ac9f70eac99427d9fa87c1e7e1908ef/" scrolling="none" frameborder="0"></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 3</h2>
            <iframe src="https://html5.gamedistribution.com/5f0179bde2b543d5900d20792978a3a5/" scrolling="none" frameborder="0"></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 4</h2>
            <iframe src="https://html5.gamedistribution.com/172e0bd0c40442dbae3d4adb42a98433/" scrolling="none" frameborder="0"></iframe>
        </div>
    </div>

    <div class="footer">
        © 2026 - Thiết kế bởi <strong>Trần Bảo Nam</strong>
    </div>

</body>
</html>
