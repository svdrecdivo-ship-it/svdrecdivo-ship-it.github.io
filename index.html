<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 WEB GAME ĐẦU BÒ 🎮</title>
    <style>
        /* Nền Gradient cực mạnh và hạt bay */
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Tạo hiệu ứng hạt bay lấp đầy khoảng trống 2 bên */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            z-index: -1;
            animation: move-bg 50s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        h1 { 
            margin: 40px 0; 
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #ff00ea, 0 0 20px #ff00ea, 0 0 40px #ff00ea;
            animation: title-glow 2s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { text-shadow: 0 0 10px #00fff2, 0 0 20px #00fff2; }
            to { text-shadow: 0 0 20px #ff00ea, 0 0 40px #ff00ea; }
        }

        /* Lưới game 2 cột */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            z-index: 1;
        }

        /* Viền ô game đổi màu RGB rực rỡ */
        .game-card { 
            background: rgba(0, 0, 0, 0.9); 
            padding: 10px; 
            border-radius: 20px; 
            position: relative;
            border: 4px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            animation: rainbow-border 3s linear infinite;
        }

        @keyframes rainbow-border {
            0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            25% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
            50% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            75% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        }

        h2 { text-align: center; color: #fff; font-size: 1.2rem; margin: 10px 0; text-transform: uppercase; }

        iframe { 
            width: 100%; 
            height: 400px; 
            border: 2px solid #333; 
            border-radius: 10px; 
        }

        /* DÒNG CHỮ CỰC GẮT CỦA NAM */
        .special-note {
            margin: 50px 0;
            font-size: 2rem;
            font-weight: 900;
            padding: 20px 50px;
            border: 5px double #fff;
            background: black;
            text-align: center;
            /* Hiệu ứng đổi màu chữ liên tục */
            animation: crazy-text 0.5s steps(1) infinite;
        }

        @keyframes crazy-text {
            0% { color: #ff0000; border-color: #00ff00; transform: rotate(-1deg); }
            25% { color: #00ff00; border-color: #ff00ff; transform: rotate(1deg); }
            50% { color: #00ffff; border-color: #ffff00; transform: scale(1.05); }
            75% { color: #ffff00; border-color: #ff0000; transform: rotate(-1deg); }
            100% { color: #ff00ea; border-color: #00ffff; transform: scale(1); }
        }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .game-grid { grid-template-columns: 1fr; }
            .special-note { font-size: 1.2rem; padding: 15px; }
        }

        .footer { 
            margin-top: 50px; width: 100%; padding: 20px; 
            background: #000; color: #555; text-align: center;
        }
    </style>
</head>
<body>

    <h1>🎮 WEB GAME CỦA NAM 🎮</h1>

    <div class="game-grid">
        <div class="game-card">
            <h2>Trò Chơi 1</h2>
            <iframe src="https://html5.gamedistribution.com/a084e6ab82f9420bbe89bbe5c1b150fc/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 2</h2>
            <iframe src="https://html5.gamedistribution.com/4ac9f70eac99427d9fa87c1e7e1908ef/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 3</h2>
            <iframe src="https://html5.gamedistribution.com/5f0179bde2b543d5900d20792978a3a5/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 4</h2>
            <iframe src="https://html5.gamedistribution.com/cecfade6d8ef4fb7a4b1924452da4204/" allowfullscreen></iframe>
         <div class="game-card">

        <script src="https://cdn.htmlgames.com/embed.js?game=JungleSniper&amp;bgcolor=white"></script></div>
        </div>
    </div>

    <div class="special-note">
