<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 WEB TEST GAME 🎮</title>
    <style>
        /* Hiệu ứng nền sáng đổi màu theo thời gian */
        body { 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            animation: light-rainbow 20s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes light-rainbow {
            0% { background-color: #ffffff; }
            25% { background-color: #f0f7ff; }
            50% { background-color: #f5f0ff; }
            75% { background-color: #fff0f5; }
            100% { background-color: #ffffff; }
        }

        /* Hạt bay phiên bản sáng màu */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            z-index: -1;
            animation: move-bg 60s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        h1 { 
            margin: 40px 0; 
            font-size: 3rem;
            color: #333;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* Lưới game tự động dàn trang */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            width: 95%;
            max-width: 1400px;
            padding-bottom: 50px;
        }

        /* Thẻ game trắng tinh tế */
        .game-card { 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #555; font-size: 1rem; margin-bottom: 15px; }

        iframe { 
            width: 100%; 
            height: 400px; 
            border: none;
            border-radius: 10px; 
            background: #f9f9f9;
        }

        /* Ghi chú đặc biệt kiểu Nam */
        .special-note {
            margin: 60px 0;
            font-size: 1.8rem;
            font-weight: 900;
            padding: 25px 60px;
            border: 3px solid #333;
            background: white;
            color: #000;
            text-align: center;
            box-shadow: 10px 10px 0px #333;
            animation: shake 0.5s infinite alternate;
        }

        @keyframes shake {
            from { transform: rotate(-1deg); }
            to { transform: rotate(1deg); }
        }

        .footer { 
            width: 100%; padding: 40px; 
            background: #fff; color: #999; text-align: center;
            border-top: 1px solid #eee;
        }
    </style>
</head>
