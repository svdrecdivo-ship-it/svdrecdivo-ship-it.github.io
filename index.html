<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 WEB GAME ĐẦU BÒ🎮</title>
    <style>
        /* Nền Gradient chuyển động phong cách Gaming */
        body { 
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            margin-bottom: 30px; 
            font-size: 2.2rem;
            text-shadow: 0 0 20px #00ffcc;
            background: rgba(0,0,0,0.5);
            padding: 10px 40px;
            border-radius: 50px;
            border: 2px solid #00ffcc;
        }

        /* Chia 2 game trên 1 hàng (Grid) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .game-card { 
            background: rgba(0, 0, 0, 0.9); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
        }

        h2 { color: #ffcc00; font-size: 1.2rem; margin-bottom: 10px; }

        /* Khung Iframe game */
        iframe { 
            width: 100%; 
            height: 400px; 
            border: none; 
            border-radius: 10px; 
            background: #000;
        }

        /* DÒNG CHỮ NHẤP NHÁY NAM YÊU CẦU */
        .special-note {
            margin: 40px 0;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff00ff; /* Hồng neon */
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            background: rgba(0,0,0,0.6);
            padding: 20px 40px;
            border-radius: 15px;
            border: 2px dashed #ff00ff;
            animation: blink-neon 1.5s infinite; /* Hiệu ứng nhấp nháy */
        }

        @keyframes blink-neon {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.5; filter: brightness(1.5); }
        }

        /* Tối ưu cho điện thoại */
        @media (max-width: 800px) {
            .game-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
            iframe { height: 300px; }
            .special-note { font-size: 1rem; width: 90%; text-align: center; }
        }

        .footer { 
            margin-top: auto; 
            width: 100%; 
            text-align: center; 
            padding: 20px; 
            background: rgba(0,0,0,0.8);
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <h1>🎮 WEB GAME ĐẦU BÒ NAM 🎮</h1>

    <div class="game-grid">
        <div class="game-card">
            <h2>Trò Chơi 1</h2>
            <iframe src="https://html5.gamedistribution.com/a084e6ab82f9420bbe89bbe5c1b150fc/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 2</h2>
            <iframe src="https://html5.gamedistribution.com/4ac9f70eac99427d9fa87c1e7e1908ef/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 3</h2>
            <iframe src="https://html5.gamedistribution.com/5f0179bde2b543d5900d20792978a3a5/" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h2>Trò Chơi 4</h2>
            <iframe src="https://html5.gamedistribution.com/cecfade6d8ef4fb7a4b1924452da4204/" allowfullscreen></iframe>
        </div>
    </div>

    <div class="special-note">
        "GAME Ờ VAI LƠ BỒ NHƯNG PỜ LÂY VẪN ĐƯỢC :0"
    </div>

    <div class="footer">
        © 2026 - Designed by <strong>Trần Bảo Nam</strong>
    </div>

</body>
</html>
